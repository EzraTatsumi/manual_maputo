<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Manual de Transição · Maputo — Briefing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b3a33; --bg2:#072a25; --ink:#0c1f1c;
    --sand:#f2ead9; --parch:#f6efe0; --mist:#a9c6c0;
    --amber:#e7a23c; --amber2:#c9832a; --brick:#d06a4f;
    --line:rgba(242,234,217,.14); --panel:rgba(255,255,255,.045);
    --star:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23e7a23c' d='M12 1.6l2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.9 5.9 20.6l1.4-6.8L2.2 8.6l6.9-.7z'/></svg>");
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--sand);
    font-family:"Hanken Grotesk",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  /* faint coordinate grid + glow */
  .stage{
    position:fixed; inset:0;
    background:
      radial-gradient(1200px 700px at 78% -10%, rgba(231,162,60,.12), transparent 60%),
      radial-gradient(900px 600px at 10% 110%, rgba(14,77,69,.55), transparent 60%),
      linear-gradient(180deg,var(--bg),var(--bg2));
  }
  .stage::before{
    content:""; position:absolute; inset:0; pointer-events:none; opacity:.5;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:64px 64px; mask:radial-gradient(120% 100% at 50% 30%,#000 35%,transparent 85%);
  }
  /* progress + chrome */
  .progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--amber),var(--amber2));width:0;z-index:40;transition:width .35s cubic-bezier(.2,.7,.2,1)}
  .topbar{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;justify-content:space-between;align-items:center;padding:18px 26px;font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--mist)}
  .topbar .brand{display:flex;align-items:center;gap:10px}
  .topbar .brand b{color:var(--sand);font-weight:700}
  .star{width:14px;height:14px;background:var(--star) center/contain no-repeat;display:inline-block}
  .menu-btn{background:none;border:1px solid var(--line);color:var(--mist);font:inherit;letter-spacing:.14em;padding:6px 12px;border-radius:999px;cursor:pointer}
  .menu-btn:hover{border-color:var(--amber);color:var(--sand)}

  /* slides */
  .deck{position:fixed;inset:0;display:grid;place-items:center;padding:84px 6vw 92px}
  .slide{position:absolute;inset:84px 6vw 92px;display:flex;flex-direction:column;justify-content:center;max-width:1040px;margin:0 auto;opacity:0;visibility:hidden;transform:translateY(14px);pointer-events:none;transition:opacity .45s ease,transform .45s ease,visibility 0s linear .45s}
  .slide.active{opacity:1;visibility:visible;transform:none;pointer-events:auto;transition:opacity .45s ease,transform .45s ease,visibility 0s}
  @media (prefers-reduced-motion:reduce){.slide{transition:opacity .2s}.slide.active{transform:none}.progress{transition:none}}

  .eyebrow{font-family:"Space Mono",monospace;font-size:12.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .eyebrow .code{color:var(--mist)}
  .eyebrow .rule{flex:1;height:1px;background:var(--line)}
  h1{font-family:"Space Grotesk",sans-serif;font-weight:700;line-height:1.02;letter-spacing:-.02em;margin:0}
  h2{font-family:"Space Grotesk",sans-serif;font-weight:600;line-height:1.05;letter-spacing:-.01em;font-size:clamp(28px,4.6vw,46px);margin:0 0 8px}
  .lede{color:var(--mist);font-size:clamp(15px,1.7vw,18px);max-width:62ch;margin:6px 0 0}

  /* bizu lists */
  .biz{list-style:none;margin:26px 0 0;padding:0;display:grid;gap:14px;grid-template-columns:1fr 1fr}
  .biz.one{grid-template-columns:1fr}
  .biz li{position:relative;padding:2px 2px 2px 34px;font-size:clamp(14.5px,1.55vw,16.5px);line-height:1.4}
  .biz li::before{content:"";position:absolute;left:0;top:2px;width:18px;height:18px;background:var(--star) center/contain no-repeat;opacity:.95}
  .biz li b{color:var(--sand);font-weight:700}
  .biz li .muted{color:var(--mist)}
  .warn{color:#ffd9cc}
  .warn::before{filter:none;background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23d06a4f' d='M12 2l11 19H1z'/><rect x='11' y='8' width='2' height='6' fill='%23072a25'/><rect x='11' y='16' width='2' height='2' fill='%23072a25'/></svg>") center/contain no-repeat}

  /* chips */
  .chips{display:flex;flex-wrap:wrap;gap:9px;margin-top:24px}
  .chip{font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.06em;color:var(--sand);text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:7px 13px;display:inline-flex;align-items:center;gap:7px;transition:.2s}
  .chip:hover{border-color:var(--amber);color:#fff;transform:translateY(-1px)}
  .chip::before{content:"↗";color:var(--amber);font-family:"Space Grotesk"}

  /* cover */
  .cover{align-items:flex-start}
  .cover .kicker{font-family:"Space Mono",monospace;letter-spacing:.28em;text-transform:uppercase;color:var(--amber);font-size:13px;margin-bottom:22px}
  .cover h1{font-size:clamp(46px,9vw,104px)}
  .cover h1 .l2{display:block;color:var(--mist);font-weight:500;-webkit-text-stroke:0}
  .cover .coords{font-family:"Space Mono",monospace;color:var(--mist);letter-spacing:.18em;margin-top:26px;font-size:13px;display:flex;gap:18px;flex-wrap:wrap;align-items:center}
  .cover .coords .star{transform:translateY(2px)}
  .route{margin-top:30px;width:min(520px,80vw);height:46px}

  /* index overlay */
  .index{position:fixed;inset:0;z-index:50;background:#072a25;display:none;padding:84px 6vw;overflow:auto}
  .index.open{display:block}
  .index h3{font-family:"Space Mono",monospace;letter-spacing:.2em;text-transform:uppercase;color:var(--amber);font-size:12.5px;margin:0}
  .index-head{display:flex;justify-content:space-between;align-items:center;margin:0 0 22px}
  .index-close{position:fixed;top:16px;right:24px;z-index:60}
  .index ol{list-style:none;margin:0;padding:0;columns:2;column-gap:48px}
  @media(max-width:680px){.index ol{columns:1}}
  .index li{break-inside:avoid;margin:0 0 4px}
  .index ol button{width:100%;text-align:left;background:none;border:0;border-bottom:1px solid var(--line);color:var(--sand);font-family:"Space Grotesk";font-size:clamp(16px,2vw,20px);padding:12px 4px;cursor:pointer;display:flex;gap:14px;align-items:baseline}
  .index ol button:hover{color:var(--amber)}
  .index ol button .n{font-family:"Space Mono";font-size:12px;color:var(--mist);min-width:26px}

  /* contacts slide */
  .grid-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px}
  .card{background:var(--parch);color:var(--ink);border-radius:12px;padding:13px 15px}
  .card .role{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#7a6a4d}
  .card .name{font-family:"Space Grotesk";font-weight:600;font-size:16px;margin:3px 0 2px}
  .card .num{font-family:"Space Mono";font-size:13px;color:#34504a;word-break:break-word}

  /* bottom nav */
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:16px 26px}
  .count{font-family:"Space Mono";font-size:12px;letter-spacing:.16em;color:var(--mist)}
  .count b{color:var(--sand)}
  .arrows{display:flex;gap:10px}
  .arrows button{width:46px;height:46px;border-radius:50%;border:1px solid var(--line);background:var(--panel);color:var(--sand);font-size:18px;cursor:pointer;transition:.2s;display:grid;place-items:center}
  .arrows button:hover:not(:disabled){border-color:var(--amber);background:rgba(231,162,60,.12)}
  .arrows button:disabled{opacity:.3;cursor:default}
  .hint{font-family:"Space Mono";font-size:11px;letter-spacing:.12em;color:var(--mist);text-transform:uppercase}
  @media(max-width:680px){.hint{display:none}.biz{grid-template-columns:1fr}.grid-cards{grid-template-columns:1fr 1fr}.slide{inset:78px 5vw 84px}.deck{padding:78px 5vw 84px}}
  @media(max-width:480px){.grid-cards{grid-template-columns:1fr}}
  :focus-visible{outline:2px solid var(--amber);outline-offset:3px;border-radius:6px}
</style>
</head>
<body>
<div class="stage"></div>
<div class="progress" id="prog"></div>

<div class="topbar">
  <div class="brand"><span class="star"></span><b>TRANSIÇÃO · MAPUTO</b></div>
  <button class="menu-btn" id="menuBtn" aria-label="Abrir índice">Índice ▾</button>
</div>

<main class="deck" id="deck" aria-live="polite"></main>

<div class="index" id="index" aria-hidden="true">
  <button class="menu-btn index-close" id="indexClose">Fechar ✕</button>
  <h3>Ordem do briefing</h3>
  <ol id="indexList"></ol>
</div>

<div class="nav">
  <div class="count"><b id="cur">01</b> / <span id="tot">18</span></div>
  <div class="hint" id="hint">← →  para navegar · I = índice</div>
  <div class="arrows">
    <button id="prev" aria-label="Anterior">‹</button>
    <button id="next" aria-label="Próximo">›</button>
  </div>
</div>

<script>
const M = "https://maps.app.goo.gl/";
function chip(label, id){ return `<a class="chip" href="${M}${id}" target="_blank" rel="noopener">${label}</a>`; }

const slides = [
  // 0 — cover
  { eyebrow:"Passagem de função", code:"DOSSIÊ",
    html:`<section class="slide cover active">
      <div class="kicker">Manual de Sobrevivência &amp; Qualidade de Vida</div>
      <h1>Maputo<span class="l2">missão &amp; vida no terreno</span></h1>
      <p class="lede">O resumo de boas-vindas para quem assume a função. Os meses de tentativa e erro, já mapeados — chegada, finanças, mobilidade, saúde, escola, rancho e fronteira.</p>
      <svg class="route" viewBox="0 0 520 46" fill="none" aria-hidden="true">
        <path d="M6 38 C160 38 150 10 300 12 C420 14 470 12 514 12" stroke="rgba(169,198,192,.5)" stroke-width="1.5" stroke-dasharray="4 6"/>
        <circle cx="6" cy="38" r="4" fill="#a9c6c0"/>
        <text x="2" y="32" fill="#a9c6c0" font-family="Space Mono" font-size="10">BR</text>
        <path d="M300 6l2.6 5.6 6.1.6-4.6 4.1 1.3 6-5.4-2.4-5.4 2.4 1.3-6-4.6-4.1 6.1-.6z" fill="#e7a23c"/>
        <text x="486" y="32" fill="#a9c6c0" font-family="Space Mono" font-size="10">MPM</text>
        <circle cx="514" cy="12" r="3" fill="#a9c6c0"/>
      </svg>
      <div class="coords"><span class="star"></span> 25°58′ S · 32°35′ E <span>·</span> GMT+2 <span>·</span> 18 telas</div>
    </section>` },

  // 1 — antes de embarcar
  { eyebrow:"Brasil · antes de embarcar", code:"01",
    html:`<h2>Antes de embarcar</h2>
      <p class="lede">O que resolver no Brasil para não travar nas primeiras semanas.</p>
      <ul class="biz">
        <li><b>Passagens via SCDP</b> <span class="muted">— calendário oficial; embarque flexível, mas o excedente é por sua conta.</span></li>
        <li><b>Bagagem:</b> 3 malas (militar) / 2 (dependente). <span class="muted">SCDP compra só 1 — guarde a nota fiscal das extras.</span></li>
        <li><b>Doutrina das malas:</b> filme stretch vermelho, rastreador dentro, tag plastificada e inventário de cada mala.</li>
        <li><b>NIP antecipado</b> <span class="muted">— é a chave para abrir conta. Coordene com a Aditância antes de viajar.</span></li>
        <li><b>Fotos 3x4:</b> 10–15 por pessoa. <span class="muted">A burocracia local consome muito papel.</span></li>
        <li><b>Febre amarela (CIVP)</b> + seguro viagem <span class="muted">— conferidos na chegada.</span></li>
      </ul>` },

  // 2 — a viagem
  { eyebrow:"Rota · GRU → JNB → MPM", code:"02",
    html:`<h2>A viagem</h2>
      <p class="lede">Latam até Joanesburgo, conexão AirLink para Maputo.</p>
      <ul class="biz">
        <li><b>GRU → JNB</b> <span class="muted">— Latam, voo noturno em dias alternados.</span></li>
        <li><b>Escala em JNB:</b> Aspire Lounge (portão A7) tem duchas e camas. <span class="muted">Priority Pass / DragonPass.</span></li>
        <li><b>JNB → MPM:</b> pegue o voo do fim da tarde <span class="muted">— o da tarde deixa janela curta para a imigração.</span></li>
        <li><b>AirLink:</b> avião pequeno, malas podem ficar para trás. <span class="muted">Leve essenciais na mão.</span></li>
        <li class="warn"><b>Atrasos são o padrão</b> — embarque é no nível inferior, a pé e por shuttle.</li>
      </ul>` },

  // 3 — chegada e instalação
  { eyebrow:"Chegada · instalação", code:"03",
    html:`<h2>Chegada &amp; primeiros dias</h2>
      <ul class="biz">
        <li><b>Recepção garantida</b> <span class="muted">— Adido e equipe esperam no aeroporto e fazem o traslado.</span></li>
        <li><b>Hospedagem família:</b> Montebelo Indy <span class="muted">(casa T2/T3, cozinha, camareira).</span></li>
        <li><b>Hospedagem central:</b> Xenon <span class="muted">— a pé, ao lado do apto do Adido.</span></li>
        <li><b>Vodacom + M-Pesa</b> <span class="muted">— o "PIX" moçambicano. Resolva o chip no dia 1.</span></li>
        <li><b>Energia:</b> celular vira roteador e carteira — <span class="muted">leve powerbank e um aparelho extra.</span></li>
        <li><b>Fuso +5h de Brasília</b> <span class="muted">— jetlag real; crie janelas para o Brasil.</span></li>
      </ul>
      <div class="chips">${chip("Montebelo Indy","yJ3xcRwnesDNLXc88")+chip("Xenon","x1Gvi5xcW59zKwWv5")}</div>` },

  // 4 — documentação
  { eyebrow:"Legalização no país", code:"04",
    html:`<h2>Documentação de chegada</h2>
      <p class="lede">Tudo via Aditância e Embaixada do Brasil.</p>
      <ul class="biz">
        <li><b>Visto</b> <span class="muted">— entrada e permanência inicial.</span></li>
        <li><b>DIRE</b> <span class="muted">— identidade de residente estrangeiro.</span></li>
        <li><b>NIP</b> <span class="muted">— o "CPF" local; destrava a conta bancária.</span></li>
        <li><b>Carteira Consular</b> <span class="muted">— vínculo com a Embaixada.</span></li>
        <li><b>Acabou a foto?</b> KODAK imprime por WhatsApp <span class="muted">— você manda o arquivo e só busca.</span></li>
      </ul>` },

  // 5 — finanças
  { eyebrow:"Finanças · inteligência bancária", code:"05",
    html:`<h2>Finanças</h2>
      <p class="lede">A "guerra das divisas" molda tudo aqui.</p>
      <ul class="biz">
        <li><b>Traga dólar em espécie</b> <span class="muted">— sacar dólar da conta local é difícil e exige justificativa de saída.</span></li>
        <li><b>Débito na África do Sul:</b> abra no <b>FNB</b> ou <b>Standard Bank</b> <span class="muted">— BCI e Millennium costumam bloquear o uso internacional.</span></li>
        <li><b>BCI:</b> peça cartão de pronta entrega <span class="muted">— o personalizado leva 20–25 dias.</span></li>
        <li><b>Transferência BB Americas → BCI:</b> US$30 + US$10 fixos. <span class="muted">Conteste taxa percentual indevida.</span></li>
        <li><b>Câmbio na rua:</b> Mercado Central, com o "Seu Bar" <span class="muted">— confirme a cotação antes.</span></li>
      </ul>
      <div class="chips">${chip("Mercado Central","iMUDbGy9DQmqG7E4A")}</div>` },

  // 6 — veículo
  { eyebrow:"Veículo · habilitação · trânsito", code:"06",
    html:`<h2>Veículo &amp; mobilidade</h2>
      <ul class="biz">
        <li><b>Compre de expatriado de saída</b> <span class="muted">— pague em reais no Brasil; zero câmbio/IOF.</span></li>
        <li><b>Carro grande</b> <span class="muted">— cabe o rancho da AS e dá segurança no trânsito.</span></li>
        <li><b>CNH nova (com inglês)</b> dispensa a PID <span class="muted">— e é o que vale na África do Sul.</span></li>
        <li><b>Três selos no para-brisa:</b> inspeção, seguro (Fidelidade) e licença da autarquia.</li>
        <li><b>Combustível:</b> diesel ~116 MT · gasolina ~94 MT <span class="muted">(~R$10 e ~R$8).</span></li>
        <li><b>Mão inglesa:</b> em Maputo, defensiva total; na AS, STOP é parar e vale o rodízio de 4 vias.</li>
      </ul>
      <div class="chips">${chip("Mecânico Luiz Fernando","k5YQvoM2Awe9FCQp6")}</div>` },

  // 7 — moradia
  { eyebrow:"Moradia definitiva", code:"07",
    html:`<h2>Onde morar</h2>
      <ul class="biz">
        <li><b>Sem pressa</b> <span class="muted">— fique 1–2 meses no trânsito antes de assinar.</span></li>
        <li><b>Regra da caminhada</b> <span class="muted">— escola, clínica e mercado a pé tiram a família do trânsito.</span></li>
        <li><b>Referência:</b> ParkMoza, na Av. Marginal <span class="muted">— área nobre, segura, com brisa do mar.</span></li>
        <li><b>Corretores:</b> Liliana (atende a Aditância), Edelson Pires e Dina.</li>
        <li><b>Facebook Marketplace</b> <span class="muted">— bom para ver o mercado real (Maputo x Matola).</span></li>
      </ul>
      <div class="chips">${chip("ParkMoza / Marginal","c3ZWZS4rfSUruJQU8")}</div>` },

  // 8 — trabalho
  { eyebrow:"ISEDEF · deslocamento", code:"08",
    html:`<h2>Trabalho &amp; trajeto</h2>
      <ul class="biz">
        <li><b>Destino:</b> ISEDEF <span class="muted">— Instituto Superior de Estudos de Defesa.</span></li>
        <li><b>Rota:</b> Av. Joaquim Chissano; <span class="muted">se houver obra/retenção, fuja pela Marginal.</span></li>
        <li><b>Tempos:</b> ~40 min ida · ~25–30 min volta.</li>
        <li><b>Plano B — carona:</b> Projeto 5 (Exército Português), com a escola.</li>
        <li><b>Contato:</b> Sgt Aninceto <span class="muted">— WhatsApp, mas peça com antecedência.</span></li>
      </ul>
      <div class="chips">${chip("ISEDEF","hpU4ZvCABhVJgF2EA")}</div>` },

  // 9 — saúde
  { eyebrow:"Saúde · assistência médica", code:"09",
    html:`<h2>Saúde</h2>
      <ul class="biz">
        <li><b>Eletivo = autorização prévia</b> <span class="muted">— e-mail da DSAU antes de marcar.</span></li>
        <li class="warn"><b>Emergência:</b> atenda primeiro, ressarcimento depois.</li>
        <li><b>Ressarcimento:</b> tabela oficial + câmbio do Banco Central <span class="muted">— apoio do ST Handal.</span></li>
        <li><b>Hospital Privado de Maputo</b> <span class="muted">— 24h, usado pelo corpo diplomático.</span></li>
        <li><b>Casos complexos:</b> deslocamento à África do Sul ainda é comum.</li>
      </ul>
      <div class="chips">${chip("Hospital Privado","he2QBDQPVcnRCzZN6")}</div>` },

  // 10 — escolas
  { eyebrow:"Educação · rede internacional", code:"10",
    html:`<h2>Escolas</h2>
      <p class="lede">A escolha influencia onde morar. Opções mapeadas:</p>
      <ul class="biz">
        <li><b>Portuguesa de Moçambique</b></li>
        <li><b>American School of Maputo</b></li>
        <li><b>Italiana</b> <span class="muted">— perto do Indy.</span></li>
        <li><b>Francesa (Lycée)</b></li>
        <li><b>Australiana · Turca</b></li>
        <li><b>Infantil "Era Uma Vez"</b> <span class="muted">— validada na prática.</span></li>
      </ul>` },

  // 11 — rancho
  { eyebrow:"Abastecimento · o \"rancho\"", code:"11",
    html:`<h2>Rancho: Maputo + Mbombela</h2>
      <ul class="biz">
        <li><b>Dia a dia:</b> Shoprite, SuperSpar, Woolworths.</li>
        <li><b>Carne:</b> Mega ou MEAT.ME <span class="muted">— talho que entrega em casa.</span></li>
        <li><b>Rancho pesado:</b> Makro + Checkers em Mbombela (AS).</li>
        <li><b>Base lá:</b> Sr. Naimo <span class="muted">— casa com geladeira; leve 2 coolers.</span></li>
        <li class="warn"><b>Não circule à noite na África do Sul.</b></li>
        <li><b>Vodacom AS:</b> recarga é física <span class="muted">— deixe saldo "dormindo" antes de voltar.</span></li>
      </ul>
      <div class="chips">${chip("Makro","41TxsoKjVN9sdAUw7")+chip("Checkers","aNJabwR1exhm2UwX6")}</div>` },

  // 12 — fronteira
  { eyebrow:"Fronteira · Maputo ↔ AS", code:"12",
    html:`<h2>Protocolo de fronteira</h2>

const deck = document.getElementById('deck');
const idxList = document.getElementById('indexList');
slides.forEach((s,i)=>{
  let el;
  if(s.html.trim().startsWith('<section')){ el = document.createElement('div'); el.innerHTML = s.html; el = el.firstElementChild; }
  else { el = document.createElement('section'); el.className='slide'; el.innerHTML = `<div class="eyebrow"><span class="code">${s.code}</span><span class="rule"></span><span>${s.eyebrow}</span></div>${s.html}`; }
  el.dataset.i = i;
  deck.appendChild(el);
  // index entry (skip cover/closing labels nicely)
  const li = document.createElement('li');
  const label = i===0 ? 'Abertura' : (i===slides.length-1 ? 'Encerramento' : s.eyebrow.split('·')[0].trim());
  li.innerHTML = `<button data-go="${i}"><span class="n">${String(i+1).padStart(2,'0')}</span>${label}</button>`;
  idxList.appendChild(li);
});

const els = [...document.querySelectorAll('.slide')];
const tot = els.length;
document.getElementById('tot').textContent = tot;
let cur = 0;

function show(n){
  cur = Math.max(0, Math.min(tot-1, n));
  els.forEach((e,i)=>e.classList.toggle('active', i===cur));
  document.getElementById('prog').style.width = ((cur)/(tot-1)*100)+'%';
  document.getElementById('cur').textContent = String(cur+1).padStart(2,'0');
  document.getElementById('prev').disabled = cur===0;
  document.getElementById('next').disabled = cur===tot-1;
}
document.getElementById('next').onclick=()=>show(cur+1);
document.getElementById('prev').onclick=()=>show(cur-1);

const index = document.getElementById('index');
function openIdx(o){ index.classList.toggle('open',o); index.setAttribute('aria-hidden',!o); }
document.getElementById('menuBtn').onclick=()=>openIdx(true);
document.getElementById('indexClose').onclick=()=>openIdx(false);
idxList.onclick=(e)=>{ const b=e.target.closest('button'); if(b){ show(+b.dataset.go); openIdx(false);} };

document.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){e.preventDefault();show(cur+1);}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();show(cur-1);}
  else if(e.key==='Home'){show(0);} else if(e.key==='End'){show(tot-1);}
  else if(e.key.toLowerCase()==='i'){openIdx(!index.classList.contains('open'));}
  else if(e.key==='Escape'){openIdx(false);}
});
// touch swipe
let tx=0;
document.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>50) show(cur + (dx<0?1:-1));},{passive:true});

show(0);
</script>
